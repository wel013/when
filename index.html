<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>.</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #080808;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #timer {
      font-family: 'Courier New', Courier, monospace;
      font-size: clamp(32px, 8vw, 72px);
      font-weight: 400;
      color: #e8e8e8;
      letter-spacing: 0.08em;
      line-height: 1;
      user-select: none;
    }

    #sub {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      color: #222;
      letter-spacing: 0.6em;
      text-align: center;
      margin-top: 2rem;
      min-height: 14px;
      transition: color 0.1s;
    }

    @keyframes glitch {
      0%   { transform: translate(0); }
      15%  { transform: translate(-3px, 1px);  text-shadow:  3px 0 #ff003c, -3px 0 #00f0ff; }
      30%  { transform: translate( 3px, -1px); text-shadow: -3px 0 #ff003c,  3px 0 #00f0ff; }
      50%  { transform: translate(-1px,  2px); text-shadow:  2px 0 #ff003c; }
      70%  { transform: translate( 2px,  0);   text-shadow: -1px 0 #00f0ff; }
      100% { transform: translate(0);          text-shadow: none; }
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.85; }
      75%       { opacity: 0.92; }
    }

    .is-glitching  { animation: glitch   0.18s steps(1) forwards; }
    .is-flickering { animation: flicker  0.08s steps(1) 3; }

    @media (prefers-reduced-motion: reduce) {
      .is-glitching, .is-flickering { animation: none; }
    }
  </style>
</head>
<body>
  <div style="text-align: center;">
    <div id="timer">---:--:--:--</div>
    <div id="sub">· · · · · · ·</div>
  </div>

  <script>
    const TARGET = new Date('2026-09-09T09:09:09');

    const timer = document.getElementById('timer');
    const sub   = document.getElementById('sub');

    const GLITCH_CHARS = '░▒▓█▄▀■□01';
    const CRYPTIC      = ['▓░▒▓░▒', '■ □ ■ □', '▀▄▀▄▀▄', '░ ░ ░ ░', '▪ ▫ ▪ ▫', '▒▒▒▒▒▒▒'];

    function pad(n, w) {
      return String(n).padStart(w, '0');
    }

    function getCountdown() {
      const diff = TARGET - new Date();
      if (diff <= 0) return '000:00:00:00';
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000)  / 60000);
      const s = Math.floor((diff % 60000)    / 1000);
      return `${pad(d, 3)}:${pad(h, 2)}:${pad(m, 2)}:${pad(s, 2)}`;
    }

    function corrupt(str) {
      return str.split('').map(c => {
        if (c === ':') return c;
        return Math.random() < 0.45
          ? GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)]
          : c;
      }).join('');
    }

    function tick() {
      timer.textContent = getCountdown();
    }

    function triggerGlitch() {
      const clean = getCountdown();
      timer.classList.add('is-glitching');
      timer.textContent = corrupt(clean);
      sub.textContent   = CRYPTIC[Math.floor(Math.random() * CRYPTIC.length)];
      sub.style.color   = '#3a3a3a';

      setTimeout(() => {
        timer.classList.remove('is-glitching');
        timer.textContent = clean;
      }, 180);

      setTimeout(() => {
        timer.classList.add('is-flickering');
        sub.textContent = '· · · · · · ·';
        sub.style.color = '#222';
        setTimeout(() => timer.classList.remove('is-flickering'), 250);
      }, 200);
    }

    tick();
    setInterval(tick, 1000);
    setInterval(() => { if (Math.random() < 0.35) triggerGlitch(); }, 2800);
  </script>
</body>
</html>
